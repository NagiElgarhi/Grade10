<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>قناة أولى ثانوى</title>
    <script>
      // Supress benign sandbox HMR Vite WebSocket connection errors
      window.addEventListener('unhandledrejection', function (event) {
        if (event.reason && (
          String(event.reason).includes('WebSocket') || 
          String(event.reason).includes('vite') ||
          (event.reason.message && (event.reason.message.includes('WebSocket') || event.reason.message.includes('vite')))
        )) {
          event.preventDefault();
        }
      });
      window.addEventListener('error', function (event) {
        if (event.message && (event.message.includes('WebSocket') || event.message.includes('vite'))) {
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
